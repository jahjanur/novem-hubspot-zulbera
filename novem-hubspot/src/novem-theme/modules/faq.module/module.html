<section class="sec sec--alt"{% if module.anchor_id %} id="{{ module.anchor_id }}"{% endif %}>
  <div class="wm">
    {% if module.eyebrow %}<div class="eye"><span class="eye-dot"></span>{{ module.eyebrow }}</div>{% endif %}
    {% if module.headline %}<h2 class="h2 rev" style="text-align:center;margin-bottom:3rem;">{{ module.headline }}</h2>{% endif %}
    <div class="faq-wrap">
      {% for item in module.items %}
        <details class="faq-item rev{% if loop.index > 1 %} d{{ (loop.index - 1) % 3 + 1 }}{% endif %}">
          <summary class="faq-q">{{ item.question }}</summary>
          <div class="faq-a">{{ item.answer }}</div>
        </details>
      {% endfor %}
    </div>
  </div>
</section>
