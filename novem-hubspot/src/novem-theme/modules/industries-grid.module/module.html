<section class="sec{% if module.background_style == 'light' %} sec--alt{% endif %}"{% if module.anchor_id %} id="{{ module.anchor_id }}"{% endif %}>
  <div class="w">
    <div class="rev" style="text-align:center;max-width:46ch;margin-inline:auto;margin-bottom:3rem;">
      <p class="eye" style="justify-content:center;"><span class="eye-dot"></span>{{ module.eyebrow }}</p>
      <h2 class="h2">{{ module.headline }} <span class="accent">{{ module.headline_accent }}</span></h2>
    </div>
    <div class="seg-g">
      {% for it in module.items %}
        {% if it.link_url.href %}<a href="{{ it.link_url.href }}" class="seg rev{% if not loop.first %} d{{ loop.index0 }}{% endif %}" style="text-decoration:none;color:inherit;">{% else %}<div class="seg rev{% if not loop.first %} d{{ loop.index0 }}{% endif %}">{% endif %}
          {% if it.image.src %}<div class="seg-img"><img src="{{ it.image.src }}" alt="{{ it.image.alt or it.title }}" loading="lazy"/></div>{% endif %}
          <div class="seg-body">
            <div class="seg-t">{{ it.title }}</div>
            <p class="sm">{{ it.description }}</p>
          </div>
        {% if it.link_url.href %}</a>{% else %}</div>{% endif %}
      {% endfor %}
    </div>
  </div>
</section>
