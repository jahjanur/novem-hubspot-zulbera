<section class="sec sec--alt" id="{{ module.anchor_id }}">
  <div class="w"><div class="prob-g">
    <div class="rev" style="text-align:center;max-width:52ch;margin-inline:auto;">
      <p class="eye" style="justify-content:center;">{{ module.eyebrow }}</p>
      <h2 class="h2" style="margin-bottom:1.25rem;">{{ module.headline }} <span class="accent">{{ module.headline_accent }}</span></h2>
      <p class="lg">{{ module.sub }}</p>
    </div>
    <div class="prob-cards rev d1">
      {% for c in module.cards %}
        <div class="prob-card"><div class="h3">{{ c.title }}</div><p class="sm">{{ c.text }}</p></div>
      {% endfor %}
    </div>
  </div></div>
</section>
