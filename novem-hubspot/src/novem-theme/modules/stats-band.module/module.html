<section class="sec{% if module.background_style == 'light' %} sec--alt{% endif %}"{% if module.anchor_id %} id="{{ module.anchor_id }}"{% endif %}>
  <div class="w">
    <div class="rev" style="text-align:center;max-width:46ch;margin-inline:auto;margin-bottom:3rem;">
      <p class="eye" style="justify-content:center;"><span class="eye-dot"></span>{{ module.eyebrow }}</p>
      <h2 class="h2">{{ module.headline }} <span class="accent">{{ module.headline_accent }}</span></h2>
    </div>
    <div class="stats-row" style="display:grid;grid-template-columns:repeat({{ module.stats|length }},1fr);gap:1.5rem;text-align:center;">
      {% for s in module.stats %}
        <div class="stat-b rev{% if not loop.first %} d{{ loop.index0 }}{% endif %}">
          <div class="stat-b-num">{{ s.num }}</div>
          <div class="stat-b-lbl">{{ s.lbl }}</div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
