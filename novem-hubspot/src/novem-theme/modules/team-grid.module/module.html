<section class="sec{% if module.background_style == 'light' %} sec--alt{% endif %}"{% if module.anchor_id %} id="{{ module.anchor_id }}"{% endif %}>
  <div class="w">
    <div class="rev" style="text-align:center;max-width:46ch;margin-inline:auto;margin-bottom:3rem;">
      <p class="eye" style="justify-content:center;"><span class="eye-dot"></span>{{ module.eyebrow }}</p>
      <h2 class="h2">{{ module.headline }} <span class="accent">{{ module.headline_accent }}</span></h2>
    </div>
    <div style="display:grid;grid-template-columns:repeat({{ module.columns }},1fr);gap:1.5rem;">
      {% for p in module.people %}
        <div class="rev{% if not loop.first %} d{{ loop.index0 }}{% endif %}" style="background:var(--surf);border:1px solid var(--border);border-radius:var(--rxl);padding:1.5rem;display:flex;flex-direction:column;gap:1rem;">
          {% if p.photo.src %}
            <img src="{{ p.photo.src }}" alt="{{ p.photo.alt or p.full_name }}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:var(--rlg);" loading="lazy"/>
          {% endif %}
          <div>
            <div class="h3" style="margin-bottom:.2rem;">{{ p.full_name }}</div>
            <p style="font-size:.875rem;color:var(--green);font-weight:600;letter-spacing:.05em;margin-bottom:.5rem;">{{ p.role }}</p>
            <div class="sm">{{ p.bio }}</div>
            {% if p.linkedin.href %}
              <a href="{{ p.linkedin.href }}" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:.4rem;margin-top:.75rem;font-size:.85rem;color:var(--muted);text-decoration:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                LinkedIn
              </a>
            {% endif %}
          </div>
        </div>
      {% endfor %}
    </div>
  </div>
</section>
