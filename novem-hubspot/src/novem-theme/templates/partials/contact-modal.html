<style>
.cmodal-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 0; visibility: hidden; transition: opacity .28s ease; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
.cmodal-overlay.open { opacity: 1; visibility: visible; }
.cmodal { width: min(560px, 100%); background: var(--surf); border: 1px solid var(--border); border-radius: var(--rxl); box-shadow: var(--sh-lg); padding: clamp(1.75rem,4vw,2.5rem); transform: translateY(16px) scale(.98); transition: transform .3s cubic-bezier(.16,1,.3,1); max-height: 90vh; overflow-y: auto; }
.cmodal-overlay.open .cmodal { transform: none; }
.cmodal-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: .35rem; }
.cmodal-close { flex-shrink: 0; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: var(--muted); border-radius: var(--rmd); transition: background var(--ease), color var(--ease); }
.cmodal-close:hover { background: color-mix(in srgb, var(--text) 8%, transparent); color: var(--text); }
.cmodal-eye { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .13em; color: var(--green); margin-bottom: .6rem; }
.cmodal-title { font-family: var(--font-h); font-weight: 700; font-size: clamp(1.4rem,1.2rem + 1vw,1.9rem); color: var(--text); line-height: 1.15; margin-bottom: .5rem; }
.cmodal-sub { font-size: clamp(.95rem,.9rem + .2vw,1.05rem); color: var(--muted); line-height: 1.6; margin-bottom: 1.75rem; }
.cmodal-opts { display: flex; flex-direction: column; gap: .85rem; }
.cmodal-opt { display: flex; align-items: center; gap: 1.1rem; padding: 1.1rem 1.35rem; border: 1px solid var(--border); border-radius: var(--rlg); background: var(--bg); text-decoration: none; transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease); }
.cmodal-opt:hover { border-color: color-mix(in srgb, var(--green) 45%, var(--border)); transform: translateY(-2px); box-shadow: var(--sh-md); }
.cmodal-opt-ic { flex-shrink: 0; width: 2.6rem; height: 2.6rem; border-radius: var(--rmd); display: flex; align-items: center; justify-content: center; color: var(--green); background: color-mix(in srgb, var(--green) 12%, transparent); }
.cmodal-opt-txt { flex: 1; }
.cmodal-opt-t { display: block; font-family: var(--font-h); font-weight: 700; font-size: 1.05rem; color: var(--text); margin-bottom: .2rem; }
.cmodal-opt-d { display: block; font-size: .85rem; color: var(--muted); line-height: 1.45; }
.cmodal-opt-arrow { flex-shrink: 0; color: var(--faint); transition: transform var(--ease), color var(--ease); }
.cmodal-opt:hover .cmodal-opt-arrow { color: var(--green); transform: translateX(3px); }
.cmodal-foot { margin-top: 1.5rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: .85rem; color: var(--muted); }
.cmodal-foot a { color: var(--green); text-decoration: none; font-weight: 600; }
.cmodal-foot a:hover { text-decoration: underline; }
</style>

<script>
(function(){
  if(window.__novemContactModalBound) return; window.__novemContactModalBound = true;
  var cModal = document.getElementById('contactModal');
  var cClose = document.getElementById('cmodalClose');
  if(!cModal) return;
  function open(e){ if(e) e.preventDefault(); cModal.classList.add('open'); cModal.setAttribute('aria-hidden','false'); document.body.classList.add('no-scroll'); }
  function close(){ cModal.classList.remove('open'); cModal.setAttribute('aria-hidden','true'); document.body.classList.remove('no-scroll'); }
  document.querySelectorAll('[data-contact-open]').forEach(function(b){ b.addEventListener('click', open); });
  if(cClose) cClose.addEventListener('click', close);
  cModal.addEventListener('click', function(e){ if(e.target===cModal) close(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && cModal.classList.contains('open')) close(); });
})();
</script>
